---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-global-a
  namespace: workspace-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: e2e-global-a
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: e2e-global-a
        ws.kloudkit.com/zone: global
    spec:
      containers:
        - name: httpd
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /www && echo ok > /www/healthz && httpd -f -p 8080 -h /www"]
---
