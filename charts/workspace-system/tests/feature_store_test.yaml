---
suite: Feature Store
templates:
  - templates/system.yaml
release:
  name: my-release
  namespace: workspace-system
tests:
  - it: should render only the NetworkPolicy when disabled (default)
    asserts:
      - hasDocuments:
          count: 1

  - it: should render NetworkPolicy, Deployment, and Service when enabled
    set:
      featureStore.enabled: true
    asserts:
      - hasDocuments:
          count: 3

  - it: should render a Deployment when enabled
    set:
      featureStore.enabled: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should use default image repository
    set:
      featureStore.enabled: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/kloudkit/ws-feature-store:v2026.02

  - it: should use default image tag v2026.02
    set:
      featureStore.enabled: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":v2026\\.02$"

  - it: should default replicas to 1
    set:
      featureStore.enabled: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should override image repository
    set:
      featureStore.enabled: true
      featureStore.image.repository: my-registry/custom-store
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^my-registry/custom-store:"

  - it: should override image tag
    set:
      featureStore.enabled: true
      featureStore.image.tag: v2099.01
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":v2099\\.01$"

  - it: should override replicas
    set:
      featureStore.enabled: true
      featureStore.replicas: 3
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should render a ClusterIP Service
    set:
      featureStore.enabled: true
    documentSelector:
      path: kind
      value: Service
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should not set resources by default
    set:
      featureStore.enabled: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].resources

  - it: should set resources when specified
    set:
      featureStore.enabled: true
      featureStore.resources.requests.cpu: 50m
      featureStore.resources.requests.memory: 64Mi
      featureStore.resources.limits.memory: 128Mi
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 50m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 64Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 128Mi

  - it: should expose port 80
    set:
      featureStore.enabled: true
    documentSelector:
      path: kind
      value: Service
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 80
