suite: Traefik ingress controller
release:
  name: my-release
  namespace: workspace-system
tests:
  - it: should render an IngressClass when enabled
    set:
      traefik.enabled: true
    templates:
      - charts/traefik/templates/ingressclass.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: workspace-traefik

  - it: should not set IngressClass as cluster default
    set:
      traefik.enabled: true
    templates:
      - charts/traefik/templates/ingressclass.yaml
    asserts:
      - notEqual:
          path: metadata.annotations["ingressclass.kubernetes.io/is-default-class"]
          value: "true"

  - it: should label Traefik pods as zone=global
    set:
      traefik.enabled: true
    templates:
      - charts/traefik/templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["ws.kloudkit.com/zone"]
          value: global

  - it: should scope Ingress provider to ws.kloudkit.com/zone labelled resources
    set:
      traefik.enabled: true
    templates:
      - charts/traefik/templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --providers.kubernetesingress.labelSelector=ws.kloudkit.com/zone
