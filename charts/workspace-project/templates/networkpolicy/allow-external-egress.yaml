{{- $p := .Values.project | default dict -}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
{{- with (dig "network" "clusterCIDRs" nil $p) }}
            except:
              {{- toYaml . | nindent 14 }}
{{- end }}
