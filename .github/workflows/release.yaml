---
name: 🚀 Release

on:
  push:
    branches:
      - main
    paths:
      - charts/*/Chart.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔧 Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: ☸ Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.17.3

      - name: ⏬ Build dependencies
        run: |
          helm repo add bjw-s https://bjw-s-labs.github.io/helm-charts --force-update
          helm dependency build charts/workspace/
          helm dependency build charts/workspace-system/

      - name: 🔧 Install chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          install_only: true

      - name: 📦 Package all charts
        run: |
          for d in charts/*/; do cr package "$d"; done

      - name: 🚀 Upload to GitHub Releases
        run: >-
          cr upload
          --skip-existing
          --pages-branch main
          --owner ${{ github.repository_owner }}
          --git-repo ${{ github.event.repository.name }}
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📇 Generate index
        run: |
          cr index \
            --owner ${{ github.repository_owner }} \
            --git-repo ${{ github.event.repository.name }} \
            --pages-branch main \
            --pages-index-path index.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .cr-index/

      - name: ⛅ Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

      - name: 🔐 Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 📦 Push to GHCR (OCI)
        run: |
          for chart in .cr-release-packages/*.tgz; do
            helm push "$chart" oci://ghcr.io/kloudkit/charts
          done
